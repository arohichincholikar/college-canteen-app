<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Specials – GNITS Canteen</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav>
  <div class="logo">🍽️ GNITS <span>Canteen</span></div>
  <ul>
    <li><a href="menu.html">Explore</a></li>
    <li><a href="specials.html" class="active">Today's Picks</a></li>
    <li><a href="track.html">Track Order</a></li>
    <li><a href="history.html">Your Orders</a></li>
    <li><a href="reviews.html">Reviews</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:0.8rem;">
    <button class="cart-btn" id="cart-badge" onclick="window.location.href='menu.html'">🛒 My Tray</button>
    <button class="cart-btn" style="background:#fff3;color:#fff;" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>⭐ Today's Picks</h1>
    <p id="today-date"></p>
  </div>

  <div id="specials-wrap"></div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a href="menu.html"><span class="bn-icon">🍽️</span>Explore</a>
  <a href="specials.html" class="active"><span class="bn-icon">⭐</span>Today's Picks</a>
  <a href="track.html"><span class="bn-icon">📍</span>Track</a>
  <a href="history.html"><span class="bn-icon">🧾</span>Your Orders</a>
  <a href="reviews.html"><span class="bn-icon">💬</span>Reviews</a>
</nav>

<div id="toast" class="toast"></div>
<script src="data/menu.js"></script>
<script src="js/app.js"></script>
<script>
  if (!requireAuth()) {}

  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  function render() {
    const specials = getSpecials();
    const wrap = document.getElementById('specials-wrap');
    if (specials.length === 0) {
      wrap.innerHTML = `<div class="empty-state"><div class="icon">🍽️</div><p>No specials today. Check back later!</p></div>`;
      return;
    }
    wrap.innerHTML = `<div class="specials-grid">` + specials.map(s => {
      const orig = MENU.find(m => m.id === s.id);
      return `<div class="special-card">
        <div class="s-name">${orig.item}</div>
        <div class="s-orig">Original: ₹${orig.price}</div>
        <div class="s-price">₹${s.specialPrice}</div>
        <div class="s-wait">⏱ ~${orig.wait} mins &nbsp;|&nbsp; ${orig.category}</div>
        <button class="add-btn" onclick="addSpecial(${orig.id})">Add to Cart</button>
      </div>`;
    }).join('') + `</div>`;
  }

  function addSpecial(id) {
    const item = MENU.find(m => m.id === id);
    const special = getSpecials().find(s => s.id === id);
    addToCart({ ...item, price: special.specialPrice });
    updateCartBadge();
  }

  render();
  updateCartBadge();
</script>
</body>
</html>
